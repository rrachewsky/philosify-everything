<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#1a1a2e"/>

  <!-- Decorative circles -->
  <circle cx="600" cy="315" r="250" fill="none" stroke="#c9ada7" stroke-width="3" opacity="0.2"/>
  <circle cx="600" cy="315" r="200" fill="none" stroke="#c9ada7" stroke-width="2" opacity="0.15"/>

  <!-- Phi symbol Φ -->
  <text x="600" y="260" font-family="'EB Garamond', serif" font-size="180" font-weight="700" fill="#c9ada7" text-anchor="middle">Φ</text>

  <!-- PHILOSIFY text -->
  <text x="600" y="380" font-family="'EB Garamond', serif" font-size="68" font-weight="600" fill="#c9ada7" text-anchor="middle" letter-spacing="8">PHILOSIFY</text>

  <!-- Tagline -->
  <text x="600" y="450" font-family="'EB Garamond', serif" font-size="32" font-weight="400" fill="#c9ada7" text-anchor="middle" opacity="0.8">Philosophical Music Analysis</text>

  <!-- Decorative line -->
  <line x1="350" y1="490" x2="850" y2="490" stroke="#c9ada7" stroke-width="1" opacity="0.4"/>

  <!-- Bottom text -->
  <text x="600" y="540" font-family="'EB Garamond', serif" font-size="24" font-weight="400" fill="#c9ada7" text-anchor="middle" opacity="0.6">Analyze music through the lens of Objectivist philosophy</text>
</svg>
