<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Background -->
  <rect width="400" height="400" fill="#1a1a2e"/>

  <!-- Decorative circle -->
  <circle cx="200" cy="200" r="150" fill="none" stroke="#c9ada7" stroke-width="2" opacity="0.3"/>

  <!-- Inner decorative circle -->
  <circle cx="200" cy="200" r="120" fill="none" stroke="#c9ada7" stroke-width="1.5" opacity="0.2"/>

  <!-- Phi symbol Φ -->
  <text x="200" y="240" font-family="'EB Garamond', serif" font-size="140" font-weight="600" fill="#c9ada7" text-anchor="middle">Φ</text>

  <!-- PHILOSIFY text -->
  <text x="200" y="340" font-family="'EB Garamond', serif" font-size="32" font-weight="500" fill="#c9ada7" text-anchor="middle" letter-spacing="4">PHILOSIFY</text>
</svg>
